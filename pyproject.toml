# Project tooling config. Kept minimal on purpose — see CLAUDE.md on avoiding
# premature machinery. Configures pytest and ruff.

[tool.pytest.ini_options]
# Put the repo root on sys.path so tests can `import server` / `import model`
# no matter how pytest is launched (`pytest` vs `python -m pytest`). Without
# this, a bare `pytest` can't find the packages and collection fails.
pythonpath = ["."]
testpaths = ["tests"]
filterwarnings = [
    # Surface warnings from our own code, but silence one external deprecation
    # emitted by starlette (a FastAPI dependency) when it imports python-multipart.
    "ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
# A deliberately small, low-noise rule set — readability first, nothing nitpicky
# to fight. E/W: pycodestyle, F: pyflakes (unused imports/vars, real mistakes),
# I: import sorting.
select = ["E", "W", "F", "I"]
